<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Richiee Live 🌍</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>Richiee Live 🌍</h1>
    <p id="status">Connected. Press Start.</p>

    <div class="topbar">
      <div class="geo">
        <span class="pill">
          <img id="youFlag" class="flag" alt="You flag" />
          <b id="youCountry">--</b>
        </span>

        <span class="pill">
          <img id="partnerFlag" class="flag" alt="New Partner flag" />
          <b id="partnerCountry">--</b>
        </span>
      </div>

      <div class="filter">
        <label for="countrySelect">Match:</label>
        <select id="countrySelect">
          <option value="ANY">Any country</option>
        </select>
      </div>
    </div>
  </header>

  <main class="layoutSingle">
    <section class="videos twoVideos">
      <div class="card">
        <h2>You</h2>
        <video id="localVideo" autoplay playsinline muted></video>
      </div>

      <div class="card">
        <h2>New Partner</h2>
        <video id="remoteVideo" autoplay playsinline></video>
      </div>
    </section>

    <section class="belowActions">
      <button id="chatBtn" class="actionBtn">Chat</button>
      <button id="supportBtn" class="actionBtn">Support</button>
      <button id="abuseBtn" class="actionBtn">Report issue</button>
      <button id="contributeBtn" class="actionBtn">Contribute</button>
    </section>
  </main>

  <footer class="controls">
    <button id="startBtn">Start</button>
    <button id="nextBtn" disabled>Next</button>
    <button id="stopBtn" disabled>Stop</button>
    <button id="camBtn" disabled>Camera Off</button>
    <button id="micBtn" disabled>Mute</button>
  </footer>

  <!-- Floating modal -->
  <div id="modalBackdrop" class="modalBackdrop hidden"></div>

  <div id="modal" class="modal hidden">
    <div class="modalHeader">
      <h3 id="modalTitle">Window</h3>
      <button id="modalClose" type="button">✕</button>
    </div>
    <div id="modalBody" class="modalBody"></div>
  </div>

  <!-- Hidden templates -->
  <template id="chatTemplate">
    <section class="popupSection">
      <h2>Chat</h2>
      <div id="chatBoxPopup" class="chatBox"></div>
      <form id="chatFormPopup" class="chatForm">
        <input id="chatInputPopup" type="text" placeholder="Type a message…" autocomplete="off" />
        <button type="submit">Send</button>
      </form>
    </section>
  </template>

  <template id="supportTemplate">
    <section class="popupSection">
      <h2>Support</h2>
      <p class="muted">Send an issue or suggestion to Richiee Support.</p>

      <form id="supportFormPopup" class="form">
        <label>
          Category
          <select id="supportCategoryPopup">
            <option value="Suggestion">Suggestion</option>
            <option value="Bug">Bug / Not working</option>
            <option value="Account">Account / Access</option>
            <option value="Payment">Payment / Contribution</option>
            <option value="Other">Other</option>
          </select>
        </label>

        <label>
          Message
          <textarea id="supportMessagePopup" rows="4" placeholder="Explain the issue or suggestion…"></textarea>
        </label>

        <button type="submit">Send to Support</button>
        <p id="supportStatusPopup" class="muted"></p>
      </form>
    </section>
  </template>

  <template id="abuseTemplate">
    <section class="popupSection">
      <h2>Report issue</h2>
      <p class="muted">Report a New Partner for harassment, scams, nudity, threats, or other abuse.</p>

      <form id="abuseFormPopup" class="form">
        <label>
          Reason
          <select id="abuseReasonPopup">
            <option value="Harassment">Harassment</option>
            <option value="Scam">Scam / Fraud</option>
            <option value="Sexual content">Sexual content</option>
            <option value="Hate / Violence">Hate / Violence</option>
            <option value="Other">Other</option>
          </select>
        </label>

        <label>
          Details (optional)
          <textarea id="abuseDetailsPopup" rows="4" placeholder="Add details that help moderation…"></textarea>
        </label>

        <button type="submit">Submit report</button>
        <p id="abuseStatusPopup" class="muted"></p>
      </form>
    </section>
  </template>

  <template id="contributeTemplate">
    <section class="popupSection">
      <h2>Contribute</h2>
      <p class="muted">Support Richiee Live development. Choose KES or USD.</p>

      <div class="contribBox">
        <div class="contribCard">
          <h3>KES (M-Pesa)</h3>
          <p><b>Till:</b> <span id="mpesaTillPopup">3062600</span></p>
          <button id="copyTillBtnPopup" type="button">Copy Till</button>
        </div>

        <div class="contribCard">
          <h3>USD (Card/PayPal)</h3>
          <input id="usdLinkPopup" type="text" placeholder="https://..." />
          <button id="openUsdBtnPopup" type="button">Open USD link</button>
        </div>
      </div>
    </section>
  </template>

  <script src="/socket.io/socket.io.js"></script>
  <script src="countries.js"></script>
  <script src="client.js"></script>
</body>
</html>
